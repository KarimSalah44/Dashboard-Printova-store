<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برينتوفا — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<!-- SheetJS for Excel export/import -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --primary:#0d1b2a;
  --orange:#f36c21;
  --orange-light:#ff8c42;
  --orange-pale:#fff4ee;
  --white:#fff;
  --gray:#8a9bb0;
  --gray-light:#f4f6f9;
  --border:#e8edf3;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --info:#3b82f6;
  --sidebar:260px;
  --topbar:60px;
  --shadow:0 2px 12px rgba(13,27,42,.07);
  --radius:16px;
  --radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Cairo',sans-serif;background:var(--gray-light);color:var(--primary);direction:rtl;min-height:100vh;}

/* ===== LOGIN ===== */
#loginScreen{
  position:fixed;inset:0;background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  z-index:999;padding:20px;
}
.login-card{
  background:#fff;border-radius:24px;
  padding:40px 36px;width:100%;max-width:400px;
}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo-name{font-size:28px;font-weight:900;}
.login-logo-name span{color:var(--orange);}
.login-logo-sub{font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.login-tag{
  background:var(--orange-pale);color:var(--orange);
  padding:6px 16px;border-radius:50px;font-size:12px;font-weight:700;
  display:inline-flex;align-items:center;gap:6px;margin-bottom:24px;
}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;}
.form-group input{
  width:100%;padding:12px 14px;border:2px solid var(--border);
  border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;
  font-size:14px;outline:none;transition:.2s;
}
.form-group input:focus{border-color:var(--orange);}
.btn-full{
  width:100%;padding:13px;background:var(--orange);color:#fff;
  border:none;border-radius:var(--radius-sm);
  font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:.2s;
}
.btn-full:hover{background:var(--orange-light);}
.login-err{
  background:#fef2f2;color:var(--danger);
  padding:10px 14px;border-radius:var(--radius-sm);
  font-size:13px;margin-bottom:14px;display:none;
  border:1px solid #fecaca;
}

/* ===== APP LAYOUT ===== */
#adminApp{display:none;min-height:100vh;}
.sidebar{
  position:fixed;top:0;right:0;bottom:0;
  width:var(--sidebar);background:var(--primary);
  z-index:80;display:flex;flex-direction:column;
  transition:.3s;overflow:hidden;
}
.sb-logo{
  padding:20px;border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
.sb-logo-name{font-size:20px;font-weight:900;color:#fff;}
.sb-logo-name span{color:var(--orange);}
.sb-logo-sub{font-size:10px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;}
.sb-nav{flex:1;overflow-y:auto;padding:12px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}
.sb-section{
  padding:10px 20px 4px;font-size:10px;color:var(--gray);
  letter-spacing:2px;text-transform:uppercase;
}
.sb-link{
  display:flex;align-items:center;gap:12px;
  padding:11px 20px;color:rgba(255,255,255,.6);
  font-size:14px;font-weight:600;cursor:pointer;
  transition:.2s;border:none;background:none;
  width:100%;text-align:right;font-family:'Cairo',sans-serif;
  border-right:3px solid transparent;
  text-decoration:none;
}
.sb-link svg{flex-shrink:0;opacity:.7;}
.sb-link:hover{color:#fff;background:rgba(255,255,255,.05);}
.sb-link:hover svg{opacity:1;}
.sb-link.active{color:#fff;background:rgba(243,108,33,.15);border-right-color:var(--orange);}
.sb-link.active svg{opacity:1;}
.sb-badge{
  margin-right:auto;background:var(--orange);color:#fff;
  border-radius:50px;padding:2px 9px;font-size:11px;font-weight:700;
}
.sb-footer{
  padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
.sb-user-email{color:rgba(255,255,255,.5);font-size:12px;margin-bottom:10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-logout{
  width:100%;padding:9px 14px;
  background:rgba(239,68,68,.12);color:var(--danger);
  border:none;border-radius:8px;font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-logout:hover{background:rgba(239,68,68,.22);}
/* MAIN */
.main-area{margin-right:var(--sidebar);min-height:100vh;display:flex;flex-direction:column;}
.main-topbar{
  background:#fff;border-bottom:1px solid var(--border);
  height:var(--topbar);display:flex;align-items:center;
  justify-content:space-between;padding:0 24px;
  position:sticky;top:0;z-index:70;box-shadow:var(--shadow);
  flex-shrink:0;
}
.main-title{font-size:17px;font-weight:900;display:flex;align-items:center;gap:8px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.pending-chip{
  background:var(--orange-pale);color:var(--orange);
  padding:5px 14px;border-radius:50px;font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:6px;
}
.btn-refresh{
  background:var(--gray-light);color:var(--primary);
  border:none;border-radius:8px;padding:8px 14px;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;
}
.btn-refresh:hover{background:var(--border);}
.content-area{flex:1;padding:24px;max-width:1400px;width:100%;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{
  background:#fff;border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;
}
.stat-icon-wrap{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.stat-icon-wrap.orange{background:var(--orange-pale);color:var(--orange);}
.stat-icon-wrap.green{background:#f0fdf4;color:var(--success);}
.stat-icon-wrap.blue{background:#eff6ff;color:var(--info);}
.stat-icon-wrap.red{background:#fef2f2;color:var(--danger);}
.stat-icon-wrap.purple{background:#f5f3ff;color:#7c3aed;}
.stat-val{font-size:24px;font-weight:900;line-height:1;}
.stat-label{font-size:12px;color:var(--gray);margin-top:2px;}

/* SECTION CARD */
.sec-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}
.sec-card-head{
  padding:14px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
}
.sec-card-head h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{
  background:var(--gray-light);padding:11px 16px;
  text-align:right;font-size:12px;font-weight:700;
  color:var(--gray);white-space:nowrap;
}
td{
  padding:10px 16px;border-bottom:1px solid var(--border);
  font-size:13px;
  max-width:180px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
td.td-wrap{white-space:normal;max-width:200px;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#fafbfc;}
.status-sel{
  padding:5px 10px;border:1px solid var(--border);
  border-radius:7px;font-family:'Cairo',sans-serif;
  font-size:12px;outline:none;cursor:pointer;background:#fff;
}
.status-badge{padding:4px 12px;border-radius:50px;font-size:11px;font-weight:700;display:inline-block;}
.sb-pending{background:#fff7ed;color:#c2410c;}
.sb-processing{background:#eff6ff;color:#1d4ed8;}
.sb-done{background:#f0fdf4;color:#15803d;}
.sb-cancelled{background:#fef2f2;color:#b91c1c;}
.btn-sm{
  padding:6px 12px;border:none;border-radius:7px;
  font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:4px;
}
.btn-view{background:var(--gray-light);color:var(--primary);}
.btn-view:hover{background:var(--border);}
.btn-edit{background:#eff6ff;color:var(--info);}
.btn-edit:hover{background:#dbeafe;}
.btn-del{background:#fef2f2;color:var(--danger);}
.btn-del:hover{background:#fee2e2;}
.btn-add{background:var(--orange);color:#fff;}
.btn-add:hover{background:var(--orange-light);}
.btn-green{background:#f0fdf4;color:#15803d;}
.btn-green:hover{background:#dcfce7;}
.btn-purple{background:#f5f3ff;color:#7c3aed;}
.btn-purple:hover{background:#ede9fe;}

/* PROD THUMB */
.prod-row-thumb{
  width:38px;height:38px;border-radius:10px;
  background:var(--gray-light);display:flex;align-items:center;
  justify-content:center;color:var(--gray);
  overflow:hidden;flex-shrink:0;
}
.prod-row-thumb img{width:100%;height:100%;object-fit:cover;}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(13,27,42,.5);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:#fff;border-radius:20px;width:100%;max-width:540px;
  max-height:90vh;overflow-y:auto;
  animation:slideUp .3s ease;position:relative;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:#fff;z-index:1;
}
.modal-title{font-size:17px;font-weight:900;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--gray);display:flex;padding:4px;}
.modal-body{padding:20px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group select{
  width:100%;padding:11px 14px;border:2px solid var(--border);
  border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;
  font-size:14px;outline:none;transition:.2s;background:#fff;
}
.form-group select:focus{border-color:var(--orange);}
.form-group textarea{
  width:100%;padding:11px 14px;border:2px solid var(--border);
  border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;
  font-size:14px;outline:none;transition:.2s;resize:vertical;
}
.form-group textarea:focus{border-color:var(--orange);}

/* ORDER DETAIL */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.detail-box{background:var(--gray-light);border-radius:var(--radius-sm);padding:14px;}
.detail-box .db-label{font-size:11px;color:var(--gray);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;}
.detail-box .db-val{font-size:14px;font-weight:700;}
.oi-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-bottom:1px solid var(--border);
}
.oi-row:last-child{border-bottom:none;}
.oi-info{flex:1;}
.oi-name{font-size:13px;font-weight:700;}
.oi-note{font-size:11px;color:var(--gray);margin-top:2px;}
.oi-price{font-size:14px;font-weight:900;color:var(--orange);text-align:left;}

/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;color:var(--gray);}
.empty-state p{margin-top:12px;font-size:14px;}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:var(--primary);color:#fff;
  padding:11px 22px;border-radius:50px;font-size:13px;font-weight:600;
  box-shadow:0 8px 28px rgba(13,27,42,.25);
  opacity:0;transform:translateY(10px);transition:.3s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0);}

/* SEARCH */
.search-input-wrap{position:relative;flex:1;min-width:220px;}
.search-input-wrap input{
  width:100%;padding:10px 14px;border:2px solid var(--border);
  border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;
  font-size:14px;outline:none;transition:.2s;
}
.search-input-wrap input:focus{border-color:var(--orange);}

/* FINANCE PAGE */
.finance-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.period-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.period-tab{
  padding:7px 18px;border-radius:50px;border:2px solid var(--border);
  background:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;color:var(--gray);
}
.period-tab.active{border-color:var(--orange);color:var(--orange);background:var(--orange-pale);}
.period-tab:hover{border-color:var(--orange);color:var(--orange);}

/* EXPENSE FORM */
.expense-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px;}
.expense-row .form-group{margin-bottom:0;flex:1;min-width:140px;}

/* RESPONSIVE */
@media(max-width:1100px){.stats-row{grid-template-columns:repeat(2,1fr);}.finance-row{grid-template-columns:repeat(2,1fr);}}
@media(max-width:900px){
  .sidebar{transform:translateX(100%);}
  .sidebar.sb-open{transform:translateX(0);}
  .main-area{margin-right:0;}
  .form-row{grid-template-columns:1fr;}
  .detail-grid{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .finance-row{grid-template-columns:repeat(2,1fr);}
  .mobile-menu-btn{display:flex!important;}
}
@media(max-width:600px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .finance-row{grid-template-columns:1fr 1fr;}
  .content-area{padding:14px;}
}
.mobile-menu-btn{
  display:none;background:none;border:none;cursor:pointer;
  color:var(--primary);padding:4px;
}
.sb-overlay{display:none;position:fixed;inset:0;z-index:79;background:rgba(13,27,42,.4);}
.sb-overlay.open{display:block;}
</style>
</head>
<body>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,getDocs,doc,updateDoc,deleteDoc,addDoc,setDoc,query,orderBy,where,serverTimestamp,Timestamp}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,onAuthStateChanged,signOut,updatePassword,EmailAuthProvider,reauthenticateWithCredential}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyD6X2QqtAFsFLOsw1DCj00ERgR4mIzl4e4",
  authDomain:"printova-store.firebaseapp.com",
  projectId:"printova-store",
  storageBucket:"printova-store.firebasestorage.app",
  messagingSenderId:"44413773021",
  appId:"1:44413773021:web:12d3877feb027f1a122734"
};

// ===== ADMIN EMAIL — غيّر من هنا فقط =====
const ADMIN_EMAIL = "karimsalah1@gmail.com";

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let orders=[];
let products=[];
let expenses=[];
let currentPage='dashboard';
let editingProductId=null;
let viewingOrder=null;
let financePeriod='today';
let currentUser=null;

// ===== AUTH =====
onAuthStateChanged(auth,async user=>{
  currentUser=user;
  if(user&&user.email===ADMIN_EMAIL){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminApp').style.display='block';
    document.getElementById('sbUserEmail').textContent=user.email;
    await Promise.all([loadOrders(),loadProducts(),loadExpenses()]);
    goTo('dashboard');
  } else if(user){
    await signOut(auth);
    showLoginErr('ليس لديك صلاحية الوصول');
  } else {
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('adminApp').style.display='none';
  }
});

window.doAdminLogin=async function(){
  const email=document.getElementById('adminLoginEmail').value.trim();
  const pass=document.getElementById('adminLoginPass').value;
  const err=document.getElementById('loginErrMsg');
  err.style.display='none';
  err.style.display='none';
  const btn=document.getElementById('loginSubmitBtn');
  btn.disabled=true;btn.textContent='جاري الدخول...';
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){
    showLoginErr('بريد أو كلمة مرور خاطئة');
    btn.disabled=false;btn.textContent='دخول';
  }
};
function showLoginErr(msg){const el=document.getElementById('loginErrMsg');el.textContent=msg;el.style.display='block';}
window.doLogout=async function(){
  if(confirm('تسجيل الخروج؟'))await signOut(auth);
};

// ===== LOAD DATA =====
async function loadOrders(){
  try{
    const q=query(collection(db,'orders'),orderBy('createdAt','desc'));
    const snap=await getDocs(q);
    orders=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){console.error('loadOrders',e);}
  updatePendingBadge();
}
async function loadProducts(){
  try{
    const snap=await getDocs(collection(db,'products'));
    products=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){console.error('loadProducts',e);}
}
async function loadExpenses(){
  try{
    const q=query(collection(db,'expenses'),orderBy('createdAt','desc'));
    const snap=await getDocs(q);
    expenses=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){console.error('loadExpenses',e);}
}

function updatePendingBadge(){
  const n=orders.filter(o=>o.status==='pending').length;
  document.querySelectorAll('.pending-count').forEach(el=>el.textContent=n);
}

// ===== NAVIGATION =====
window.goTo=function(page){
  currentPage=page;
  document.querySelectorAll('.sb-link').forEach(el=>el.classList.remove('active'));
  document.querySelector(`[data-goto="${page}"]`)?.classList.add('active');
  const titles={dashboard:'لوحة التحكم',orders:'الطلبات',products:'المنتجات',customers:'العملاء',finance:'المصاريف والمالية',settings:'الإعدادات'};
  document.getElementById('mainTitle').textContent=titles[page]||page;
  renderPage(page);
  closeSidebar();
};

function renderPage(page){
  const el=document.getElementById('contentArea');
  if(page==='dashboard')el.innerHTML=getDashboardHTML();
  else if(page==='orders')el.innerHTML=getOrdersHTML(orders);
  else if(page==='products')el.innerHTML=getProductsHTML();
  else if(page==='customers')el.innerHTML=getCustomersHTML();
  else if(page==='finance')el.innerHTML=getFinanceHTML();
  else el.innerHTML=getSettingsHTML();
  lucide.createIcons();
}

// ===== DASHBOARD =====
function getDashboardHTML(){
  const total=orders.length;
  const revenue=orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0);
  const pending=orders.filter(o=>o.status==='pending').length;
  const done=orders.filter(o=>o.status==='done').length;
  const totalExpenses=expenses.reduce((s,e)=>s+(e.amount||0),0);
  const netProfit=revenue-totalExpenses;
  return `
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon-wrap orange"><i data-lucide="shopping-cart" style="width:22px;height:22px"></i></div>
      <div><div class="stat-val">${total}</div><div class="stat-label">إجمالي الطلبات</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap green"><i data-lucide="trending-up" style="width:22px;height:22px"></i></div>
      <div><div class="stat-val">${revenue.toFixed(0)} ج</div><div class="stat-label">الإيرادات الكلية</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap blue"><i data-lucide="clock" style="width:22px;height:22px"></i></div>
      <div><div class="stat-val">${pending}</div><div class="stat-label">طلبات معلقة</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap ${netProfit>=0?'green':'red'}"><i data-lucide="wallet" style="width:22px;height:22px"></i></div>
      <div><div class="stat-val" style="color:${netProfit>=0?'var(--success)':'var(--danger)'}">${netProfit.toFixed(0)} ج</div><div class="stat-label">صافي الربح</div></div>
    </div>
  </div>
  <div class="sec-card">
    <div class="sec-card-head">
      <h3><i data-lucide="list" style="width:16px;height:16px"></i> آخر الطلبات</h3>
      <button class="btn-sm btn-view" onclick="goTo('orders')">عرض الكل</button>
    </div>
    <div class="table-wrap">${getOrdersTableHTML(orders.slice(0,6))}</div>
  </div>`;
}

// ===== ORDERS =====
let orderSearch = '';
let orderStatusFilter = 'all';

function getOrdersHTML(list){
  const searchTerm = orderSearch.trim().toLowerCase();
  let filtered = list;

  // فلتر الحالة
  if(orderStatusFilter !== 'all'){
    filtered = filtered.filter(o=>o.status===orderStatusFilter);
  }

  // فلتر البحث — بالاسم أو الهاتف أو الكود التسلسلي (001, 002...)
  if(searchTerm){
    filtered = filtered.filter((o,i) => {
      const seqNum = String(i+1).padStart(3,'0');
      return (
        (o.customerName||'').toLowerCase().includes(searchTerm) ||
        (o.phone||'').toLowerCase().includes(searchTerm) ||
        seqNum.includes(searchTerm)
      );
    });
  }

  return `
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
    <div class="search-input-wrap">
      <input type="text" id="orderSearchInput" placeholder="🔍 ابحث باسم العميل أو الهاتف أو الرقم (001)..." 
        value="${orderSearch}" 
        oninput="orderSearch=this.value;renderPage('orders');">
    </div>
    <button class="btn-sm btn-green" onclick="exportOrdersExcel()">
      <i data-lucide="download" style="width:13px;height:13px"></i> تصدير Excel
    </button>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
    <button class="btn-sm ${orderStatusFilter==='all'?'btn-add':'btn-view'}" onclick="setOrderFilter('all')">الكل (${orders.length})</button>
    <button class="btn-sm" style="${orderStatusFilter==='pending'?'background:var(--orange);color:#fff':'background:#fff7ed;color:#c2410c'}" onclick="setOrderFilter('pending')">⏳ معلق (${orders.filter(o=>o.status==='pending').length})</button>
    <button class="btn-sm" style="${orderStatusFilter==='processing'?'background:var(--info);color:#fff':'background:#eff6ff;color:#1d4ed8'}" onclick="setOrderFilter('processing')">🔄 جاري (${orders.filter(o=>o.status==='processing').length})</button>
    <button class="btn-sm" style="${orderStatusFilter==='done'?'background:var(--success);color:#fff':'background:#f0fdf4;color:#15803d'}" onclick="setOrderFilter('done')">✅ مكتمل (${orders.filter(o=>o.status==='done').length})</button>
    <button class="btn-sm" style="${orderStatusFilter==='cancelled'?'background:var(--danger);color:#fff':'background:#fef2f2;color:#b91c1c'}" onclick="setOrderFilter('cancelled')">❌ ملغي (${orders.filter(o=>o.status==='cancelled').length})</button>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
    <span style="font-size:13px;color:var(--gray);font-weight:700">تصدير حسب الفترة:</span>
    <button class="btn-sm btn-green" onclick="exportOrdersByPeriod('today')"><i data-lucide="download" style="width:12px;height:12px"></i> اليوم</button>
    <button class="btn-sm btn-green" onclick="exportOrdersByPeriod('week')"><i data-lucide="download" style="width:12px;height:12px"></i> الأسبوع</button>
    <button class="btn-sm btn-green" onclick="exportOrdersByPeriod('month')"><i data-lucide="download" style="width:12px;height:12px"></i> الشهر</button>
  </div>
  <div class="sec-card">
    <div class="table-wrap">${getOrdersTableHTML(filtered)}</div>
  </div>`;
}

window.setOrderFilter = function(status){
  orderStatusFilter = status;
  renderPage('orders');
};

function getOrdersTableHTML(list){
  // الترقيم يعتمد على الأحدث أولاً — الطلب الأقدم = 001
  // نرتبهم تصاعدياً للترقيم، ونعرضهم تنازلياً (list جاية من orders المرتبة desc)
  const allSorted = [...orders].reverse(); // الأقدم أول للترقيم
  
  if(!list.length)return`<div class="empty-state"><i data-lucide="inbox" style="width:40px;height:40px"></i><p>لا توجد طلبات</p></div>`;
  return`<table>
    <thead><tr><th>الرقم</th><th>العميل</th><th>الهاتف</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th><th>إجراءات</th></tr></thead>
    <tbody>${list.map(o=>{
      // الرقم التسلسلي الحقيقي من قائمة كل الطلبات مرتبة تصاعدياً
      const realIdx = allSorted.findIndex(x=>x.id===o.id);
      const seq = realIdx>=0 ? String(realIdx+1).padStart(3,'0') : '???';
      return`<tr>
      <td><b style="color:var(--orange)">#${seq}</b></td>
      <td><b>${o.customerName||'—'}</b></td>
      <td><a href="tel:${o.phone}" style="color:var(--orange);text-decoration:none;font-weight:600">${o.phone||'—'}</a></td>
      <td><b style="color:var(--success)">${(o.total||0).toFixed(2)} ج</b></td>
      <td>
        <select class="status-sel" onchange="updateStatus('${o.id}',this.value)">
          <option value="pending" ${o.status==='pending'?'selected':''}>⏳ معلق</option>
          <option value="processing" ${o.status==='processing'?'selected':''}>🔄 جاري</option>
          <option value="done" ${o.status==='done'?'selected':''}>✅ مكتمل</option>
          <option value="cancelled" ${o.status==='cancelled'?'selected':''}>❌ ملغي</option>
        </select>
      </td>
      <td style="color:var(--gray)">${o.createdAt?.toDate?.()?.toLocaleDateString('ar-EG')||'—'}</td>
      <td>
        <button class="btn-sm btn-view" onclick="viewOrderDetail('${o.id}')">
          <i data-lucide="eye" style="width:12px;height:12px"></i> عرض
        </button>
      </td>
    </tr>`;
    }).join('')}</tbody>
  </table>`;
}

window.updateStatus=async function(id,status){
  try{
    await updateDoc(doc(db,'orders',id),{status});
    const o=orders.find(x=>x.id===id);if(o)o.status=status;
    updatePendingBadge();showToast('✅ تم تحديث الحالة');
  }catch(e){showToast('❌ '+e.message);}
};

  const o=orders.find(x=>x.id===id);if(!o)return;
  const realIdx=allSorted.findIndex(x=>x.id===id);
  const seq=realIdx>=0?String(realIdx+1).padStart(3,'0'):'???';
  viewingOrder=o;
  document.getElementById('orderDetailBody').innerHTML=`
    <div style="margin-bottom:12px">
      <span class="status-badge sb-pending" style="font-size:13px">طلب #${seq}</span>
    </div>
    <div class="detail-grid">

      <div class="detail-box"><div class="db-label">الهاتف</div><div class="db-val"><a href="tel:${o.phone}" style="color:var(--orange)">${o.phone||'—'}</a></div></div>
      <div class="detail-box"><div class="db-label">العنوان</div><div class="db-val">${o.address||'—'}</div></div>

    </div>
    ${o.notes?`<div class="detail-box" style="margin-bottom:16px"><div class="db-label">ملاحظات</div><div class="db-val">${o.notes}</div></div>`:''}
    <div style="font-size:14px;font-weight:700;margin-bottom:10px">المنتجات المطلوبة</div>

      ${(o.items||[]).map(i=>`<div class="oi-row">

        <div class="oi-price"><div style="font-size:11px;color:var(--gray)">${i.qty} × ${i.price} ج</div><div>${(i.qty*i.price).toFixed(2)} ج</div></div>
      </div>`).join('')}

};

// ===== EXPORT ORDERS =====
window.exportOrdersExcel=function(filteredList){
  const allSorted=[...orders].reverse();
  const list=filteredList||orders;
  const rows=list.map(o=>{
    const realIdx=allSorted.findIndex(x=>x.id===o.id);
    const seq=realIdx>=0?String(realIdx+1).padStart(3,'0'):'???';
    const statusMap={pending:'معلق',processing:'جاري التنفيذ',done:'مكتمل',cancelled:'ملغي'};
    return{
      'الرقم':'#'+seq,
      'اسم العميل':o.customerName||'—',
      'الهاتف':o.phone||'—',
      'العنوان':o.address||'—',
      'المنتجات':(o.items||[]).map(i=>`${i.name}×${i.qty}`).join(' | '),
      'الإجمالي':(o.total||0).toFixed(2)+' ج',
      'الحالة':statusMap[o.status]||o.status,
      'التاريخ':o.createdAt?.toDate?.()?.toLocaleDateString('ar-EG')||'—',
      'البريد':o.userEmail||'—',
      'ملاحظات':o.notes||''
    };
  });
  downloadExcel(rows,'طلبات-برينتوفا');
};

window.exportOrdersByPeriod=function(period){
  const now=new Date();
  const filtered=orders.filter(o=>{
    if(!o.createdAt?.toDate)return false;
    const d=o.createdAt.toDate();
    if(period==='today'){
      return d.toDateString()===now.toDateString();
    }else if(period==='week'){
      const weekAgo=new Date(now);weekAgo.setDate(now.getDate()-7);
      return d>=weekAgo;
    }else if(period==='month'){
      return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    }
    return true;
  });
  const pLabel={today:'اليوم',week:'الأسبوع',month:'الشهر'};
  if(!filtered.length){showToast('⚠ لا توجد طلبات في هذه الفترة');return;}
  exportOrdersExcel(filtered);
  showToast(`✅ تم تصدير طلبات ${pLabel[period]} (${filtered.length} طلب)`);
};

window.openProductForm=function(id){
  editingProductId=id;
  const p=id?products.find(x=>x.id===id):null;
  document.getElementById('prodFormTitle').textContent=p?'تعديل منتج':'إضافة منتج جديد';
  document.getElementById('pName').value=p?.name||'';
  document.getElementById('pPrice').value=p?.price||'';
  document.getElementById('pUnit').value=p?.unit||'قطعة';
  document.getElementById('pDesc').value=p?.desc||'';
  document.getElementById('pImage').value=p?.image||'';
  buildCatSelect(p?.category,p?.sub);
  openModal('productFormModal');
};

function buildCatSelect(selCat,selSub){
  const catEl=document.getElementById('pCat');
  catEl.innerHTML=Object.keys(CATEGORIES).map(c=>`<option value="${c}" ${selCat===c?'selected':''}>${c}</option>`).join('');
  catEl.onchange=()=>buildSubSelect(catEl.value,null);
  buildSubSelect(selCat||Object.keys(CATEGORIES)[0],selSub);
}
function buildSubSelect(cat,selSub){
  const subs=CATEGORIES[cat]||[];
  document.getElementById('pSub').innerHTML=subs.map(s=>`<option value="${s}" ${selSub===s?'selected':''}>${s}</option>`).join('');
}
window.buildSubSelect=buildSubSelect;

window.saveProduct=async function(){
  const name=document.getElementById('pName').value.trim();
  const price=parseFloat(document.getElementById('pPrice').value);
  const unit=document.getElementById('pUnit').value.trim();
  const category=document.getElementById('pCat').value;
  const sub=document.getElementById('pSub').value;
  const desc=document.getElementById('pDesc').value.trim();
  const image=document.getElementById('pImage').value.trim();

  if(!name||isNaN(price)||!unit||!image){
    showToast('⚠ أكمل الحقول المطلوبة (الاسم، السعر، الوحدة، رابط الصورة)');return;
  }

  const btn=document.getElementById('saveProdBtn');
  btn.disabled=true;btn.textContent='جاري الحفظ...';
  try{
    const data={name,price,unit,category,sub,desc,image,updatedAt:serverTimestamp()};
    if(editingProductId){
      await updateDoc(doc(db,'products',editingProductId),data);
      const idx=products.findIndex(p=>p.id===editingProductId);
      if(idx>-1)products[idx]={...products[idx],...data};
      showToast('✅ تم تعديل المنتج');
    }else{
      data.createdAt=serverTimestamp();
      const ref=await addDoc(collection(db,'products'),data);
      products.push({id:ref.id,...data});
      showToast('✅ تم إضافة المنتج');
    }
    closeModal('productFormModal');renderPage('products');
  }catch(e){showToast('❌ '+e.message);}
  finally{btn.disabled=false;btn.textContent='💾 حفظ';}
};

window.deleteProduct=async function(id){
  if(!confirm('هل تريد حذف هذا المنتج نهائياً؟'))return;
  try{
    await deleteDoc(doc(db,'products',id));
    products=products.filter(p=>p.id!==id);
    renderPage('products');showToast('🗑 تم الحذف');
  }catch(e){showToast('❌ '+e.message);}
};

// ===== IMPORT PRODUCTS =====
window.importProductsExcel=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws);
      if(!rows.length){showToast('⚠ الملف فارغ');return;}
      
      let imported=0;
      const btn=document.querySelector('label.btn-purple');
      
      for(const row of rows){
        const name=row['اسم المنتج']||row['name']||'';
        const price=parseFloat(row['السعر']||row['price']||0);
        const unit=row['الوحدة']||row['unit']||'قطعة';
        const category=row['القسم الرئيسي']||row['category']||'';
        const sub=row['القسم الفرعي']||row['sub']||'';
        const desc=row['وصف']||row['desc']||'';
        const image=row['رابط الصورة']||row['image']||'';
        if(!name)continue;
        const d={name,price,unit,category,sub,desc,image,createdAt:serverTimestamp(),updatedAt:serverTimestamp()};
        const ref=await addDoc(collection(db,'products'),d);
        products.push({id:ref.id,...d});
        imported++;
      }
      renderPage('products');
      showToast(`✅ تم استيراد ${imported} منتج`);
      input.value='';
    }catch(err){showToast('❌ خطأ في الاستيراد: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
};

window.exportCustomersExcel=function(){

  orders.forEach(o=>{

  });

  }));

let expenseTypeFilter='all';

function getFinanceHTML(){
  const now=new Date();
  
  function filterByPeriod(list,period){
    return list.filter(item=>{
      const d=item.createdAt?.toDate?.()||new Date(item.date||0);
      if(period==='today')return d.toDateString()===now.toDateString();
      if(period==='week'){const w=new Date(now);w.setDate(now.getDate()-7);return d>=w;}
      if(period==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      return true;
    });
  }

  const filteredOrders=filterByPeriod(orders,financePeriod).filter(o=>o.status!=='cancelled');
  const filteredExpenses=filterByPeriod(expenses,financePeriod);
  
  const revenue=filteredOrders.reduce((s,o)=>s+(o.total||0),0);
  const totalExpenses=filteredExpenses.reduce((s,e)=>s+(e.amount||0),0);
  const netProfit=revenue-totalExpenses;
  const ordersCount=filteredOrders.length;

  const periodLabels={today:'اليوم',week:'الأسبوع',month:'الشهر',all:'الكل'};

  return `
  <div class="period-tabs">
    <button class="period-tab ${financePeriod==='today'?'active':''}" onclick="setFinancePeriod('today')">اليوم</button>
    <button class="period-tab ${financePeriod==='week'?'active':''}" onclick="setFinancePeriod('week')">الأسبوع</button>
    <button class="period-tab ${financePeriod==='month'?'active':''}" onclick="setFinancePeriod('month')">الشهر</button>
    <button class="period-tab ${financePeriod==='all'?'active':''}" onclick="setFinancePeriod('all')">الكل</button>
  </div>

  <div class="finance-row">
    <div class="stat-card">
      <div class="stat-icon-wrap green"><i data-lucide="trending-up" style="width:22px;height:22px"></i></div>
      <div><div class="stat-val" style="color:var(--success)">${revenue.toFixed(2)} ج</div><div class="stat-label">الإيرادات — ${periodLabels[financePeriod]}</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap red"><i data-lucide="trending-down" style="width:22px;height:22px"></i></div>
      <div><div class="stat-val" style="color:var(--danger)">${totalExpenses.toFixed(2)} ج</div><div class="stat-label">المصاريف — ${periodLabels[financePeriod]}</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap ${netProfit>=0?'green':'red'}"><i data-lucide="wallet" style="width:22px;height:22px"></i></div>
      <div><div class="stat-val" style="color:${netProfit>=0?'var(--success)':'var(--danger)'}">${netProfit.toFixed(2)} ج</div><div class="stat-label">صافي الربح — ${periodLabels[financePeriod]}</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap orange"><i data-lucide="shopping-cart" style="width:22px;height:22px"></i></div>
      <div><div class="stat-val">${ordersCount}</div><div class="stat-label">طلبات — ${periodLabels[financePeriod]}</div></div>
    </div>
  </div>

  <!-- إضافة مصروف -->
  <div class="sec-card">
    <div class="sec-card-head"><h3><i data-lucide="plus-circle" style="width:15px;height:15px"></i> إضافة مصروف / دفعة</h3></div>
    <div class="modal-body">
      <div class="expense-row">
        <div class="form-group">
          <label>نوع المصروف</label>
          <select id="expType">
            <option value="مستلزمات">مستلزمات</option>
            <option value="شحن">شحن</option>
            <option value="إيجار">إيجار</option>
            <option value="رواتب">رواتب</option>
            <option value="صيانة">صيانة</option>
            <option value="إعلانات">إعلانات</option>
            <option value="دفعة مورد">دفعة مورد</option>
            <option value="أخرى">أخرى</option>
          </select>
        </div>
        <div class="form-group">
          <label>المبلغ (جنيه)</label>
          <input type="number" id="expAmount" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>ملاحظة</label>
          <input type="text" id="expNote" placeholder="وصف المصروف...">
        </div>
        <div class="form-group" style="flex:0;align-self:flex-end">
          <button class="btn-sm btn-add" onclick="addExpense()" style="padding:11px 20px;font-size:14px">
            <i data-lucide="plus" style="width:14px;height:14px"></i> إضافة
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- جدول المصاريف -->
  <div class="sec-card">
    <div class="sec-card-head">
      <h3><i data-lucide="receipt" style="width:15px;height:15px"></i> سجل المصاريف (${filteredExpenses.length})</h3>
      <button class="btn-sm btn-green" onclick="exportFinanceExcel()">

    <div class="table-wrap">
      ${!filteredExpenses.length?
        `<div class="empty-state"><i data-lucide="receipt" style="width:40px;height:40px"></i><p>لا توجد مصاريف في هذه الفترة</p></div>`
        :`<table>
          <thead><tr><th>النوع</th><th>المبلغ</th><th>ملاحظة</th><th>التاريخ</th><th>حذف</th></tr></thead>

            <td><span style="background:var(--orange-pale);color:var(--orange);padding:3px 10px;border-radius:50px;font-size:12px;font-weight:700">${e.type||'أخرى'}</span></td>

          </tr>`).join('')}</tbody>
        </table>`}
    </div>
  </div>

  <!-- ملخص الطلبات في الفترة -->
  <div class="sec-card">
    <div class="sec-card-head"><h3><i data-lucide="list" style="width:15px;height:15px"></i> الطلبات المكتملة — ${periodLabels[financePeriod]}</h3></div>
    <div class="table-wrap">
      ${!filteredOrders.length?
        `<div class="empty-state"><i data-lucide="inbox" style="width:40px;height:40px"></i><p>لا توجد طلبات في هذه الفترة</p></div>`
        :`<table>
          <thead><tr><th>#</th><th>العميل</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th></tr></thead>
          <tbody>${filteredOrders.map(o=>{
            const allSorted=[...orders].reverse();
            const realIdx=allSorted.findIndex(x=>x.id===o.id);
            const seq=realIdx>=0?String(realIdx+1).padStart(3,'0'):'???';
            const statusMap={pending:'معلق',processing:'جاري',done:'مكتمل',cancelled:'ملغي'};
            const statusCls={pending:'sb-pending',processing:'sb-processing',done:'sb-done',cancelled:'sb-cancelled'};
            return`<tr>
              <td><b style="color:var(--orange)">#${seq}</b></td>
              <td><b>${o.customerName||'—'}</b></td>
              <td><b style="color:var(--success)">${(o.total||0).toFixed(2)} ج</b></td>
              <td><span class="status-badge ${statusCls[o.status]||'sb-pending'}">${statusMap[o.status]||o.status}</span></td>
              <td style="color:var(--gray)">${o.createdAt?.toDate?.()?.toLocaleDateString('ar-EG')||'—'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>`}
    </div>
  </div>`;
}

window.setFinancePeriod=function(p){financePeriod=p;renderPage('finance');};

window.addExpense=async function(){
  const type=document.getElementById('expType').value;
  const amount=parseFloat(document.getElementById('expAmount').value);
  const note=document.getElementById('expNote').value.trim();
  if(!amount||isNaN(amount)||amount<=0){showToast('⚠ أدخل مبلغ صحيح');return;}
  try{
    const d={type,amount,note,createdAt:serverTimestamp()};
    const ref=await addDoc(collection(db,'expenses'),d);
    expenses.unshift({id:ref.id,...d});
    document.getElementById('expAmount').value='';
    document.getElementById('expNote').value='';
    renderPage('finance');
    showToast('✅ تم إضافة المصروف');
  }catch(e){showToast('❌ '+e.message);}
};

window.deleteExpense=async function(id){
  if(!confirm('حذف هذا المصروف؟'))return;
  try{
    await deleteDoc(doc(db,'expenses',id));
    expenses=expenses.filter(e=>e.id!==id);
    renderPage('finance');
    showToast('🗑 تم حذف المصروف');
  }catch(e){showToast('❌ '+e.message);}
};

window.exportFinanceExcel=function(){
  const rows=expenses.map(e=>({
    'النوع':e.type||'أخرى',
    'المبلغ':(e.amount||0).toFixed(2)+' ج',
    'ملاحظة':e.note||'—',
    'التاريخ':e.createdAt?.toDate?.()?.toLocaleDateString('ar-EG')||'—'
  }));
  // إضافة سطر الملخص
  const revenue=orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0);
  const totalExp=expenses.reduce((s,e)=>s+(e.amount||0),0);
  rows.push({'النوع':'','المبلغ':'','ملاحظة':'','التاريخ':''});
  rows.push({'النوع':'الإجمالي — الإيرادات','المبلغ':revenue.toFixed(2)+' ج','ملاحظة':'','التاريخ':''});
  rows.push({'النوع':'الإجمالي — المصاريف','المبلغ':totalExp.toFixed(2)+' ج','ملاحظة':'','التاريخ':''});
  rows.push({'النوع':'صافي الربح','المبلغ':(revenue-totalExp).toFixed(2)+' ج','ملاحظة':'','التاريخ':''});
  downloadExcel(rows,'مالية-برينتوفا');
  showToast('✅ تم تصدير التقرير المالي');
};

  const btn=document.getElementById('saveSettingsBtn');
  btn.disabled=true;btn.textContent='جاري الحفظ...';
  try{
    const newSettings={storeName,phone,freeShippingMsg};
    await setDoc(doc(db,'settings','storeSettings'),newSettings,{merge:true});

  }finally{
    btn.disabled=false;btn.textContent='💾 حفظ الإعدادات';

window.changePassword=async function(){
  const currentPass=document.getElementById('currentPass').value;
  const newPass=document.getElementById('newPass').value;
  const confirmPass=document.getElementById('confirmPass').value;
  const errEl=document.getElementById('passErr');
  errEl.style.display='none';

  if(!currentPass||!newPass||!confirmPass){errEl.textContent='أكمل جميع الحقول';errEl.style.display='block';return;}
  if(newPass!==confirmPass){errEl.textContent='كلمة المرور الجديدة غير متطابقة';errEl.style.display='block';return;}
  if(newPass.length<6){errEl.textContent='كلمة المرور يجب أن تكون 6 أحرف على الأقل';errEl.style.display='block';return;}

  const btn=document.getElementById('changePassBtn');
  btn.disabled=true;btn.textContent='جاري التغيير...';
  try{
    const credential=EmailAuthProvider.credential(currentUser.email,currentPass);
    await reauthenticateWithCredential(currentUser,credential);
    await updatePassword(currentUser,newPass);
    document.getElementById('currentPass').value='';
    document.getElementById('newPass').value='';
    document.getElementById('confirmPass').value='';
    showToast('✅ تم تغيير كلمة المرور بنجاح');
  }catch(e){
    if(e.code==='auth/wrong-password')errEl.textContent='كلمة المرور الحالية خاطئة';
    else errEl.textContent='خطأ: '+e.message;
    errEl.style.display='block';
  }finally{
    btn.disabled=false;btn.textContent='🔒 تغيير كلمة المرور';
  }
};

function downloadExcel(rows,filename){
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'البيانات');
  // ضبط عرض الأعمدة تلقائياً
  const cols=Object.keys(rows[0]||{}).map(k=>({wch:Math.max(k.length,16)}));
  ws['!cols']=cols;
  XLSX.writeFile(wb,`${filename}.xlsx`);
}

      <div class="modal-title" id="prodFormTitle">إضافة منتج</div>
      <button class="modal-close" onclick="closeModal('productFormModal')">
        <i data-lucide="x" style="width:20px;height:20px"></i>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>اسم المنتج *</label><input type="text" id="pName" placeholder="اسم المنتج"></div>
        <div class="form-group"><label>السعر (جنيه) *</label><input type="number" id="pPrice" step="0.01" min="0" placeholder="0.00"></div>
      </div>
      <div class="form-group"><label>الوحدة *</label>
        <select id="pUnit">
          <option>قطعة</option><option>شيت</option><option>طقم</option>
          <option>متر</option><option>كيلو</option><option>علبة</option>
        </select>
      </div>
      <div class="form-group"><label>القسم الرئيسي</label>
        <select id="pCat" onchange="buildSubSelect(this.value,null)"></select>
      </div>
      <div class="form-group"><label>القسم الفرعي</label>
        <select id="pSub"></select>
      </div>
      <div class="form-group"><label>وصف المنتج</label>
        <textarea id="pDesc" rows="3" placeholder="وصف مختصر للمنتج..."></textarea>
      </div>
      <div class="form-group">
        <label>رابط الصورة *</label>
        <input type="url" id="pImage" placeholder="https://example.com/image.jpg">
      </div>
      <button class="btn-full" id="saveProdBtn" onclick="saveProduct()">💾 حفظ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>lucide.createIcons();</script>
</body>
</html>
